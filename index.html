<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Should I Cash Out?</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg,#0b1220,#0f172a);
}
.card {
  background: rgba(15,23,42,0.75);
  border: 1px solid rgba(148,163,184,0.15);
  backdrop-filter: blur(10px);
}
.active {
  border: 1px solid #38bdf8;
  background: rgba(30,41,59,0.9);
}
</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md space-y-4">

  <!-- INPUT -->
  <div class="card rounded-2xl p-4 space-y-3">
    <h1 class="text-xl font-bold">Should I Cash Out?</h1>

    <input id="stake" type="number" placeholder="Stake ($)"
      class="w-full h-12 rounded-xl bg-slate-900 px-4">

    <input id="payout" type="number" placeholder="Payout ($)"
      class="w-full h-12 rounded-xl bg-slate-900 px-4">

    <input id="cashout" type="number" placeholder="Cashout Offer ($) (optional)"
      class="w-full h-12 rounded-xl bg-slate-900 px-4">
  </div>

  <!-- RESULT -->
  <div id="resultCard" class="card rounded-2xl p-4 hidden space-y-4">

    <!-- MAIN -->
    <div>
      <div id="fairValue" class="text-2xl font-bold"></div>
      <div id="guidance" class="text-sm text-slate-300 mt-1"></div>
    </div>

    <!-- CASHOUT COMP -->
    <div id="comparison" class="text-sm"></div>

    <!-- HEDGE INFO -->
    <div id="hedgeInfo" class="text-sm text-slate-400"></div>

    <!-- SCENARIOS -->
    <div class="grid grid-cols-3 gap-2 text-sm">
      <div id="s1" class="p-3 rounded-xl bg-white/5 text-center cursor-pointer"></div>
      <div id="s2" class="p-3 rounded-xl bg-white/10 text-center cursor-pointer"></div>
      <div id="s3" class="p-3 rounded-xl bg-white/5 text-center cursor-pointer"></div>
    </div>

    <!-- EXPLAIN -->
    <div class="text-xs text-slate-400">
      Cashouts are typically priced below hedge value due to sportsbook margin.
    </div>

    <!-- TIP -->
    <a href="https://buy.stripe.com/5kQ9AV1Jr9G79tNbLdeME00"
       target="_blank"
       class="block text-center text-xs text-amber-300">
       Support the tool
    </a>

  </div>

</div>

<script>

let selectedOdds = -110;

function toDecimal(odds){
  return odds > 0 ? 1 + odds/100 : 1 + 100/Math.abs(odds);
}

function calc(S,P,odds){

  const d = toDecimal(odds);
  const hedge = P / d;

  const win = P - hedge - S;
  const hedgeWin = hedge*(d-1) - S;

  const locked = Math.min(win,hedgeWin);
  const fairCashout = S + locked;

  return {hedge, locked, fairCashout};
}

function f(n){
  return "$"+n.toFixed(2);
}

function update(){

  const S = parseFloat(stake.value);
  const P = parseFloat(payout.value);
  const C = parseFloat(cashout.value);

  if(!S || !P || P <= S){
    resultCard.classList.add('hidden');
    return;
  }

  const main = calc(S,P,selectedOdds);

  // MAIN
  fairValue.innerText = `Fair cashout ≈ ${f(main.fairCashout)}`;

  guidance.innerText = `Cashout should be around this range to be fair`;

  // COMPARISON
  if(C){
    const diff = C - main.fairCashout;

    if(diff >= 0){
      comparison.innerHTML = `Offer: ${f(C)} → <span class="text-emerald-300">Good value (+${f(diff)})</span>`;
    } else {
      comparison.innerHTML = `Offer: ${f(C)} → <span class="text-red-300">Below fair (${f(diff)})</span>`;
    }
  } else {
    comparison.innerHTML = "";
  }

  // HEDGE INFO
  hedgeInfo.innerText =
    `At ${selectedOdds}: hedge ${f(main.hedge)} → lock ${f(main.locked)}`;

  // SCENARIOS
  const scenarios = [
    {odds:-200, el:s1},
    {odds:-110, el:s2},
    {odds:100, el:s3}
  ];

  scenarios.forEach(s=>{
    const r = calc(S,P,s.odds);

    s.el.innerHTML = `
      <div>${s.odds}</div>
      <div class="text-xs mt-1">${f(r.fairCashout)}</div>
    `;

    s.el.classList.toggle("active", s.odds===selectedOdds);

    s.el.onclick = ()=>{
      selectedOdds = s.odds;
      update();
    };
  });

  resultCard.classList.remove('hidden');
}

stake.oninput = update;
payout.oninput = update;
cashout.oninput = update;

</script>

</body>
</html>
