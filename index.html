<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Check Cashout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(168,85,247,0.14), transparent 30%),
        linear-gradient(180deg, #08111f 0%, #0b1324 45%, #0f172a 100%);
      color: #fff;
    }

    .glass {
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    .glass-soft {
      background: rgba(15, 23, 42, 0.56);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.10);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .input-base {
      width: 100%;
      height: 58px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(30, 41, 59, 0.92);
      color: white;
      padding: 0 18px;
      font-size: 17px;
      outline: none;
    }

    .input-base::placeholder {
      color: rgb(148 163 184);
    }

    .input-base:focus {
      border-color: rgba(96, 165, 250, 0.45);
      box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.25) inset;
    }

    .toggle-btn {
      transition: 160ms ease;
    }

    .toggle-btn.active-blue {
      background: rgb(37 99 235);
      color: white;
    }

    .toggle-btn.active-green {
      background: rgb(5 150 105);
      color: white;
    }

    .toggle-btn.active-purple {
      background: rgb(126 34 206);
      color: white;
    }

    .hidden-soft {
      display: none !important;
    }

    .mini-card {
      border-radius: 22px;
      background: rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
    }

    .details-toggle {
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="max-w-xl mx-auto p-4 pb-10 space-y-4">
    <div class="pt-2">
      <h1 id="pageTitle" class="text-3xl sm:text-4xl font-bold tracking-tight">Check Cashout</h1>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">
        See whether the cashout is worth taking or if a hedge locks in more.
      </p>
    </div>

    <div class="glass rounded-[28px] p-4 sm:p-5 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <button id="evaluateBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-base sm:text-lg">
          Check Cashout
        </button>
        <button id="lockBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-base sm:text-lg">
          Compare Hedge
        </button>
      </div>

      <div class="space-y-3">
        <input
          id="stake"
          class="input-base"
          inputmode="decimal"
          placeholder="Stake"
          aria-label="Stake"
        />
        <input
          id="payout"
          class="input-base"
          inputmode="decimal"
          placeholder="Total payout"
          aria-label="Total payout"
        />
        <input
          id="cash"
          class="input-base"
          inputmode="decimal"
          placeholder="Cashout offer"
          aria-label="Cashout offer"
        />
      </div>

      <div id="evaluateWrap" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <button id="oddsBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-xl">
            Odds
          </button>
          <button id="probBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-xl">
            %
          </button>
        </div>

        <input
          id="odds"
          class="input-base"
          inputmode="text"
          placeholder="Live odds"
          aria-label="Live odds"
        />
        <input
          id="prob"
          class="input-base hidden-soft"
          inputmode="decimal"
          placeholder="Win probability %"
          aria-label="Win probability"
        />
      </div>

      <div id="hedgeWrap" class="hidden-soft space-y-3">
        <input
          id="hedgeOdds"
          class="input-base"
          inputmode="text"
          placeholder="Hedge odds"
          aria-label="Hedge odds"
        />

        <div class="grid grid-cols-2 gap-3">
          <button id="equalProfitBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-base sm:text-lg">
            Equalize
          </button>
          <button id="maxFloorBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-base sm:text-lg">
            Higher Floor
          </button>
        </div>
      </div>
            <div id="result" class="hidden-soft glass-soft rounded-[28px] p-5 space-y-4">
        <div class="space-y-2">
          <div id="main" class="text-3xl sm:text-4xl font-bold leading-tight"></div>
          <div id="grade" class="text-2xl font-bold"></div>
          <div id="difference" class="text-slate-300 text-lg"></div>
          <div id="summaryLine" class="text-slate-300 text-base"></div>
        </div>

        <div
          id="detailsToggle"
          class="details-toggle flex items-center justify-between rounded-2xl bg-slate-900/50 border border-white/10 px-4 py-3 cursor-pointer"
          role="button"
          tabindex="0"
          aria-expanded="false"
        >
          <span class="text-sm text-slate-200 font-medium">Details</span>
          <span id="detailsChevron" class="text-slate-400 text-sm">Show</span>
        </div>

        <div id="detailsPanel" class="hidden-soft space-y-4">
          <div id="evaluateDetails" class="space-y-4 hidden-soft">
            <div class="space-y-3">
              <div class="flex items-center justify-between text-sm gap-3">
                <span class="text-slate-300">Offer value</span>
                <span id="ratioText" class="text-slate-100 font-semibold"></span>
              </div>

              <div class="h-3 rounded-full bg-slate-700 overflow-hidden">
                <div id="qualityBar" class="h-full rounded-full transition-all duration-200"></div>
              </div>

              <div class="text-slate-300 text-base">
                <span class="text-slate-400">Fair range:</span>
                <span id="range"></span>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div id="peakCard" class="mini-card">
                <div class="text-sm text-slate-400">Best fair value</div>
                <div id="peakOut" class="mt-2 text-2xl font-bold"></div>
              </div>

              <div class="mini-card">
                <div class="text-sm text-slate-400">Model</div>
                <div id="parlayOut" class="mt-2 text-2xl font-bold"></div>
              </div>
            </div>

            <div class="mini-card">
              <div class="text-sm text-slate-400">Offer tracker</div>
              <div class="grid grid-cols-2 gap-3 mt-3">
                <div>
                  <div class="text-xs text-slate-400">Current</div>
                  <div id="sessionCurrent" class="mt-1 text-xl font-bold"></div>
                </div>
                <div>
                  <div class="text-xs text-slate-400">Trend</div>
                  <div id="sessionTrend" class="mt-1 text-xl font-bold"></div>
                </div>
                <div>
                  <div class="text-xs text-slate-400">High</div>
                  <div id="sessionBest" class="mt-1 text-xl font-bold"></div>
                </div>
                <div>
                  <div class="text-xs text-slate-400">Low</div>
                  <div id="sessionWorst" class="mt-1 text-xl font-bold"></div>
                </div>
              </div>
              <div id="sessionVsBest" class="text-slate-300 text-sm mt-3"></div>
            </div>
          </div>

          <div id="hedgeDetails" class="space-y-4 hidden-soft">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="mini-card">
                <div class="text-sm text-slate-400">Hedge stake</div>
                <div id="hedgeStakeOut" class="mt-2 text-2xl font-bold"></div>
              </div>

              <div class="mini-card">
                <div class="text-sm text-slate-400">Hedge odds</div>
                <div id="hedgeOddsOut" class="mt-2 text-2xl font-bold"></div>
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="mini-card">
                <div class="text-sm text-slate-400">Original bet wins</div>
                <div id="origWinsOut" class="mt-2 text-2xl font-bold"></div>
              </div>

              <div class="mini-card">
                <div class="text-sm text-slate-400">Hedge wins</div>
                <div id="hedgeWinsOut" class="mt-2 text-2xl font-bold"></div>
              </div>
            </div>

            <div class="mini-card">
              <div class="text-sm text-slate-400">Best option</div>
              <div id="hedgeCompareOut" class="mt-2 text-xl font-bold"></div>
              <div id="hedgeCompareSub" class="mt-2 text-slate-300 text-sm"></div>
            </div>
          </div>
        </div>
      </div>

      <div
        id="emptyState"
        class="rounded-2xl bg-slate-900/40 border border-white/10 px-4 py-4 text-sm text-slate-400"
      >
        Enter your bet details to get started.
      </div>
    </div>
  </div>
  <script>
  const state = {
    decisionMode: 'evaluate',
    evalInput: 'odds',
    hedgeMode: 'equal',
    peakValue: 0,
    lastEvalKey: '',
    detailsOpen: false,
    sessionTracker: {
      calcKey: '',
      current: null,
      best: null,
      worst: null,
      last: null,
      trend: '—'
    }
  };

  const $ = (id) => document.getElementById(id);

  function money(n) {
    return `$${Number(n || 0).toFixed(2)}`;
  }

  function pct(n) {
    return `${(Number(n || 0) * 100).toFixed(1)}%`;
  }

  function clamp(n, min, max) {
    return Math.min(Math.max(n, min), max);
  }

  function sanitizeOdds(v) {
    if (!v) return '';
    v = String(v).trim().replace(/\s+/g, '').replace(/[^0-9+-]/g, '');
    if (v.length > 1) v = v[0] + v.slice(1).replace(/[+-]/g, '');
    if (/^\d+$/.test(v)) v = '+' + v;
    return v;
  }

  function parseOdds(v) {
    if (!v) return null;
    const cleaned = sanitizeOdds(v);
    if (!/^[+-]?\d+$/.test(cleaned)) return null;
    const n = Number(cleaned);
    return Number.isFinite(n) && n !== 0 ? n : null;
  }

  function oddsToProb(o) {
    return o > 0 ? 100 / (o + 100) : Math.abs(o) / (Math.abs(o) + 100);
  }

  function americanToDecimal(o) {
    return o > 0 ? 1 + (o / 100) : 1 + (100 / Math.abs(o));
  }

  function inferLegCount(stake, payout) {
    if (!stake || !payout || payout <= stake) return 1;
    const multiple = payout / stake;
    if (multiple >= 20) return 4;
    if (multiple >= 8) return 3;
    if (multiple >= 3) return 2;
    return 1;
  }

  function discount(prob, legs) {
    if (legs >= 4) return 0.47;
    if (legs === 3) return 0.52;
    if (legs === 2) return 0.66;

    if (prob > 0.80) return 0.90;
    if (prob > 0.60) return 0.82;
    if (prob > 0.30) return 0.72;
    if (prob > 0.10) return 0.62;
    return 0.54;
  }

  function qualityLabel(ratio) {
    if (ratio >= 1.05) return { label: 'Strong', color: 'text-emerald-300', bar: 'bg-emerald-500' };
    if (ratio >= 0.90) return { label: 'Fair', color: 'text-lime-300', bar: 'bg-lime-500' };
    if (ratio >= 0.75) return { label: 'Slightly discounted', color: 'text-yellow-300', bar: 'bg-yellow-500' };
    if (ratio >= 0.60) return { label: 'Discounted', color: 'text-amber-300', bar: 'bg-amber-500' };
    return { label: 'Poor', color: 'text-rose-300', bar: 'bg-rose-500' };
  }

  function getEvalProbability() {
    if (state.evalInput === 'odds') {
      const o = parseOdds($('odds').value);
      if (!o) return null;
      return oddsToProb(o);
    }

    const p = parseFloat($('prob').value);
    if (!Number.isFinite(p) || p <= 0 || p > 100) return null;
    return p / 100;
  }

  function getEvalKey() {
    return JSON.stringify({
      mode: state.decisionMode,
      evalInput: state.evalInput,
      stake: $('stake').value,
      payout: $('payout').value,
      odds: $('odds').value,
      prob: $('prob').value
    });
  }

  function resetSessionTracker(evalKey) {
    state.sessionTracker = {
      calcKey: evalKey,
      current: null,
      best: null,
      worst: null,
      last: null,
      trend: '—'
    };
  }

  function updateSessionTracker(evalKey, cash) {
    if (state.sessionTracker.calcKey !== evalKey) {
      resetSessionTracker(evalKey);
    }

    if (!Number.isFinite(cash) || cash <= 0) return;

    const tracker = state.sessionTracker;
    tracker.current = cash;

    if (tracker.best === null || cash > tracker.best) tracker.best = cash;
    if (tracker.worst === null || cash < tracker.worst) tracker.worst = cash;

    if (tracker.last === null) tracker.trend = 'Flat';
    else if (cash > tracker.last) tracker.trend = 'Rising';
    else if (cash < tracker.last) tracker.trend = 'Falling';
    else tracker.trend = 'Flat';

    tracker.last = cash;
  }

  function getOriginalCombinedOdds(stake, payout) {
    if (!Number.isFinite(stake) || !Number.isFinite(payout) || stake <= 0 || payout <= stake) return null;
    const decimal = payout / stake;
    const american = (decimal - 1) * 100;
    return Math.round(american);
  }

  function getEqualProfitHedgeStake(totalPayout, hedgeDecimal) {
    return totalPayout / hedgeDecimal;
  }

  function getHigherFloorHedgeStake(totalPayout, hedgeDecimal, originalStake) {
    const equalStake = getEqualProfitHedgeStake(totalPayout, hedgeDecimal);
    const minStake = originalStake * 0.5;
    return Math.max(minStake, equalStake * 0.8);
  }

  function renderModeButtons() {
    $('evaluateBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-base sm:text-lg ${state.decisionMode === 'evaluate' ? 'active-purple' : 'bg-slate-700'}`;
    $('lockBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-base sm:text-lg ${state.decisionMode === 'lock' ? 'active-purple' : 'bg-slate-700'}`;

    $('oddsBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-xl ${state.evalInput === 'odds' ? 'active-green' : 'bg-slate-700'}`;
    $('probBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-xl ${state.evalInput === 'prob' ? 'active-green' : 'bg-slate-700'}`;

    $('equalProfitBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-base sm:text-lg ${state.hedgeMode === 'equal' ? 'active-blue' : 'bg-slate-700'}`;
    $('maxFloorBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-base sm:text-lg ${state.hedgeMode === 'floor' ? 'active-blue' : 'bg-slate-700'}`;

    $('evaluateWrap').classList.toggle('hidden-soft', state.decisionMode !== 'evaluate');
    $('hedgeWrap').classList.toggle('hidden-soft', state.decisionMode !== 'lock');

    $('odds').classList.toggle('hidden-soft', state.evalInput !== 'odds');
    $('prob').classList.toggle('hidden-soft', state.evalInput !== 'prob');

    $('pageTitle').textContent = state.decisionMode === 'evaluate' ? 'Check Cashout' : 'Compare Hedge';
    document.title = state.decisionMode === 'evaluate' ? 'Check Cashout' : 'Compare Hedge';
  }

  function updateDetailsPanel() {
    $('detailsPanel').classList.toggle('hidden-soft', !state.detailsOpen);
    $('detailsToggle').setAttribute('aria-expanded', String(state.detailsOpen));
    $('detailsChevron').textContent = state.detailsOpen ? 'Hide' : 'Show';
  }

  function hideResults(message) {
    $('result').classList.add('hidden-soft');
    $('emptyState').classList.remove('hidden-soft');
    $('emptyState').textContent = message;
  }

  function showResults() {
    $('result').classList.remove('hidden-soft');
    $('emptyState').classList.add('hidden-soft');
  }
    function runEvaluateMode() {
    const stake = parseFloat($('stake').value);
    const payout = parseFloat($('payout').value);
    const cash = parseFloat($('cash').value);

    if (!Number.isFinite(stake) || !Number.isFinite(payout) || payout <= stake) {
      hideResults('Enter a valid stake and payout. Payout must be greater than stake.');
      return;
    }

    const prob = getEvalProbability();
    if (prob === null || prob <= 0 || prob > 1) {
      hideResults('Enter live odds or win probability to check the cashout.');
      return;
    }

    const inferredLegs = inferLegCount(stake, payout);
    const rawEV = prob * payout;
    const adjusted = rawEV * discount(prob, inferredLegs);
    const low = adjusted * 0.92;
    const high = adjusted * 1.08;
    const evalKey = getEvalKey();

    if (evalKey !== state.lastEvalKey) {
      state.peakValue = adjusted;
      state.lastEvalKey = evalKey;
    } else {
      state.peakValue = Math.max(state.peakValue || 0, adjusted);
    }

    updateSessionTracker(evalKey, cash);
    showResults();

    $('evaluateDetails').classList.remove('hidden-soft');
    $('hedgeDetails').classList.add('hidden-soft');

    $('main').textContent = `Fair value ≈ ${money(adjusted)}`;

    let gradeText = 'Add cashout offer';
    let gradeClass = 'text-slate-200';
    let differenceText = '';
    let ratioText = 'No offer entered';
    let qualityBarWidth = 0;
    let qualityBarClass = 'bg-slate-600';

    const originalCombined = getOriginalCombinedOdds(stake, payout);
    $('summaryLine').textContent = `Win ${pct(prob)} • Model: ~${inferredLegs} legs • Original: ${originalCombined ? `+${originalCombined}` : '—'}`;

    if (Number.isFinite(cash) && cash > 0) {
      const ratio = cash / adjusted;
      const quality = qualityLabel(ratio);
      const diff = cash - adjusted;

      gradeText = `${quality.label} → ${money(cash)}`;
      gradeClass = quality.color;
      ratioText = `${(ratio * 100).toFixed(0)}% of fair value`;
      qualityBarWidth = Math.min(ratio * 100, 100);
      qualityBarClass = quality.bar;

      if (diff >= 0) {
        differenceText = `Offer is about ${money(Math.abs(diff))} above fair value.`;
      } else {
        differenceText = `Giving up about ${money(Math.abs(diff))} vs fair value.`;
      }
    } else {
      differenceText = 'Add the cashout offer to compare it to fair value.';
    }

    $('grade').className = `text-2xl font-bold ${gradeClass}`;
    $('grade').textContent = gradeText;
    $('difference').textContent = differenceText;

    $('ratioText').textContent = ratioText;
    $('qualityBar').className = `h-full rounded-full transition-all duration-200 ${qualityBarClass}`;
    $('qualityBar').style.width = `${qualityBarWidth}%`;
    $('range').textContent = `${money(low)} – ${money(high)}`;

    $('parlayOut').textContent = `~${inferredLegs} legs`;
    $('peakOut').textContent = money(state.peakValue);

    if (Math.abs(state.peakValue - adjusted) < 0.01) {
      $('peakCard').classList.add('hidden-soft');
    } else {
      $('peakCard').classList.remove('hidden-soft');
    }

    const tracker = state.sessionTracker;
    $('sessionCurrent').textContent = tracker.current !== null ? money(tracker.current) : '—';
    $('sessionBest').textContent = tracker.best !== null ? money(tracker.best) : '—';
    $('sessionWorst').textContent = tracker.worst !== null ? money(tracker.worst) : '—';
    $('sessionTrend').textContent = tracker.trend || '—';

    if (tracker.current !== null && tracker.best !== null) {
      const vsBest = tracker.current - tracker.best;
      if (vsBest === 0) {
        $('sessionVsBest').textContent = 'Current offer matches the session high.';
      } else {
        $('sessionVsBest').textContent = `Vs high: ${vsBest > 0 ? '+' : ''}${money(vsBest)}`;
      }
    } else {
      $('sessionVsBest').textContent = 'Track multiple offers over time to compare movement.';
    }
  }

  function runHedgeMode() {
    const stake = parseFloat($('stake').value);
    const payout = parseFloat($('payout').value);
    const cash = parseFloat($('cash').value);
    const hedgeOdds = parseOdds($('hedgeOdds').value);

    if (!Number.isFinite(stake) || !Number.isFinite(payout) || payout <= stake) {
      hideResults('Enter a valid stake and payout. Payout must be greater than stake.');
      return;
    }

    if (hedgeOdds === null) {
      hideResults('Enter hedge odds to compare hedge vs cashout.');
      return;
    }

    const hedgeDecimal = americanToDecimal(hedgeOdds);
    const hedgeStake = state.hedgeMode === 'equal'
      ? getEqualProfitHedgeStake(payout, hedgeDecimal)
      : getHigherFloorHedgeStake(payout, hedgeDecimal, stake);

    const ifOriginalWins = payout - stake - hedgeStake;
    const ifHedgeWins = (hedgeStake * (hedgeDecimal - 1)) - stake;
    const minLocked = Math.min(ifOriginalWins, ifHedgeWins);
    const maxLocked = Math.max(ifOriginalWins, ifHedgeWins);

    showResults();

    $('evaluateDetails').classList.add('hidden-soft');
    $('hedgeDetails').classList.remove('hidden-soft');

    $('main').textContent = `Hedge stake ≈ ${money(hedgeStake)}`;
    $('summaryLine').textContent = `Estimated locked range: ${money(minLocked)} to ${money(maxLocked)}`;

    if (Number.isFinite(cash) && cash > 0) {
      const cashProfit = cash - stake;
      const hedgeAdvantage = minLocked - cashProfit;

      if (hedgeAdvantage > 0) {
        $('grade').className = 'text-2xl font-bold text-emerald-300';
        $('grade').textContent = 'Hedge is better';
        $('difference').textContent = `Hedge improves your locked floor by about ${money(hedgeAdvantage)}.`;
      } else if (hedgeAdvantage < 0) {
        $('grade').className = 'text-2xl font-bold text-amber-300';
        $('grade').textContent = 'Cashout is better';
        $('difference').textContent = `Cashout locks in about ${money(Math.abs(hedgeAdvantage))} more than this hedge floor.`;
      } else {
        $('grade').className = 'text-2xl font-bold text-lime-300';
        $('grade').textContent = 'Almost equal';
        $('difference').textContent = 'Cashout and hedge lock in about the same floor.';
      }
    } else {
      $('grade').className = 'text-2xl font-bold text-slate-200';
      $('grade').textContent = 'Add cashout offer';
      $('difference').textContent = 'Enter the cashout offer to compare it with the hedge.';
    }

    $('hedgeStakeOut').textContent = money(hedgeStake);
    $('hedgeOddsOut').textContent = hedgeOdds > 0 ? `+${hedgeOdds}` : `${hedgeOdds}`;
    $('origWinsOut').textContent = money(ifOriginalWins);
    $('hedgeWinsOut').textContent = money(ifHedgeWins);

    if (Number.isFinite(cash) && cash > 0) {
      const cashProfit = cash - stake;
      const hedgeAdvantage = minLocked - cashProfit;

      if (hedgeAdvantage > 0) {
        $('hedgeCompareOut').textContent = `Hedge better by ${money(hedgeAdvantage)}`;
        $('hedgeCompareSub').textContent = `Cashout profit: ${money(cashProfit)} • Hedge floor: ${money(minLocked)}`;
      } else if (hedgeAdvantage < 0) {
        $('hedgeCompareOut').textContent = `Cashout better by ${money(Math.abs(hedgeAdvantage))}`;
        $('hedgeCompareSub').textContent = `Cashout profit: ${money(cashProfit)} • Hedge floor: ${money(minLocked)}`;
      } else {
        $('hedgeCompareOut').textContent = 'Too close to call';
        $('hedgeCompareSub').textContent = `Cashout profit: ${money(cashProfit)} • Hedge floor: ${money(minLocked)}`;
      }
    } else {
      $('hedgeCompareOut').textContent = 'Add cashout offer';
      $('hedgeCompareSub').textContent = 'Enter the cashout offer to compare it with the hedge.';
    }
  }

  function calc() {
    if (state.decisionMode === 'evaluate') runEvaluateMode();
    else runHedgeMode();
  }

  document.querySelectorAll('input').forEach((input) => {
    input.addEventListener('input', calc);
  });

  $('odds').addEventListener('input', (e) => {
    e.target.value = sanitizeOdds(e.target.value);
  });

  $('hedgeOdds').addEventListener('input', (e) => {
    e.target.value = sanitizeOdds(e.target.value);
  });

  $('evaluateBtn').onclick = () => {
    state.decisionMode = 'evaluate';
    renderModeButtons();
    calc();
    $('odds').focus();
  };

  $('lockBtn').onclick = () => {
    state.decisionMode = 'lock';
    renderModeButtons();
    calc();
    $('hedgeOdds').focus();
  };

  $('oddsBtn').onclick = () => {
    state.evalInput = 'odds';
    renderModeButtons();
    calc();
    $('odds').focus();
  };

  $('probBtn').onclick = () => {
    state.evalInput = 'prob';
    renderModeButtons();
    calc();
    $('prob').focus();
  };

  $('equalProfitBtn').onclick = () => {
    state.hedgeMode = 'equal';
    renderModeButtons();
    calc();
  };

  $('maxFloorBtn').onclick = () => {
    state.hedgeMode = 'floor';
    renderModeButtons();
    calc();
  };

  $('detailsToggle').onclick = () => {
    state.detailsOpen = !state.detailsOpen;
    updateDetailsPanel();
  };

  $('detailsToggle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      state.detailsOpen = !state.detailsOpen;
      updateDetailsPanel();
    }
  });

  renderModeButtons();
  updateDetailsPanel();
  calc();
</script>
</body>
</html>
