<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Should I Cash Out?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(168,85,247,0.14), transparent 30%),
        linear-gradient(180deg, #08111f 0%, #0b1324 45%, #0f172a 100%);
      color: #fff;
    }

    .glass {
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    .glass-soft {
      background: rgba(15, 23, 42, 0.56);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.10);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .input-base {
      width: 100%;
      height: 58px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(30, 41, 59, 0.92);
      color: white;
      padding: 0 18px;
      font-size: 17px;
      outline: none;
    }

    .input-base::placeholder {
      color: rgb(148 163 184);
    }

    .input-base:focus {
      border-color: rgba(96, 165, 250, 0.45);
      box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.25) inset;
    }

    .toggle-btn {
      transition: 160ms ease;
    }

    .toggle-btn.active-blue {
      background: rgb(37 99 235);
      color: white;
    }

    .toggle-btn.active-green {
      background: rgb(5 150 105);
      color: white;
    }

    .mini-card {
      border-radius: 22px;
      background: rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
    }

    .hidden-soft {
      display: none !important;
    }

    .details-toggle {
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="max-w-xl mx-auto p-4 pb-10 space-y-4">
    <div class="pt-2">
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">Should I Cash Out?</h1>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">
        Fast live estimate for whether the cashout is worth taking.
      </p>
    </div>

    <div class="glass rounded-[28px] p-4 sm:p-5 space-y-4">
      <div class="space-y-3">
        <input
          id="stake"
          class="input-base"
          inputmode="decimal"
          placeholder="Stake ($15)"
          aria-label="Stake"
        />
        <input
          id="payout"
          class="input-base"
          inputmode="decimal"
          placeholder="Payout ($104.95)"
          aria-label="Payout"
        />
        <input
          id="cash"
          class="input-base"
          inputmode="decimal"
          placeholder="Cashout (optional)"
          aria-label="Cashout offer"
        />
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button id="liveBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-xl">
          Live
        </button>
        <button id="notLiveBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-xl">
          Not Live
        </button>
      </div>

      <div id="liveWrap" class="space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <button id="oddsBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-xl">
            Odds
          </button>
          <button id="probBtn" class="toggle-btn h-14 rounded-2xl bg-slate-700 font-semibold text-xl">
            %
          </button>
        </div>

        <input
          id="odds"
          class="input-base"
          inputmode="text"
          placeholder="Live odds (+6114 or -145)"
          aria-label="Live odds"
        />
        <input
          id="prob"
          class="input-base hidden-soft"
          inputmode="decimal"
          placeholder="Win % (6.96)"
          aria-label="Win probability"
        />
      </div>

      <div id="legsWrap" class="hidden-soft space-y-3">
        <div class="flex items-center justify-between gap-3">
          <div class="text-sm text-slate-300">Remaining legs</div>
          <button
            id="addLeg"
            class="px-4 h-10 rounded-xl bg-blue-500 font-medium whitespace-nowrap"
          >
            + Add Leg
          </button>
        </div>
        <div id="legs" class="space-y-2"></div>
      </div>
            <div id="result" class="hidden-soft glass-soft rounded-[28px] p-5 space-y-4">
        <div class="space-y-2">
          <div id="main" class="text-3xl sm:text-4xl font-bold leading-tight"></div>
          <div id="grade" class="text-2xl font-bold"></div>
          <div id="difference" class="text-slate-300 text-lg"></div>
          <div id="summaryLine" class="text-slate-300 text-base"></div>
        </div>

        <div
          id="detailsToggle"
          class="details-toggle flex items-center justify-between rounded-2xl bg-slate-900/50 border border-white/10 px-4 py-3 cursor-pointer"
          role="button"
          tabindex="0"
          aria-expanded="false"
        >
          <span class="text-sm text-slate-200 font-medium">More details</span>
          <span id="detailsChevron" class="text-slate-400 text-sm">Show</span>
        </div>

        <div id="detailsPanel" class="hidden-soft space-y-4">
          <div class="space-y-3">
            <div class="flex items-center justify-between text-sm gap-3">
              <span class="text-slate-300">Offer quality</span>
              <span id="ratioText" class="text-slate-100 font-semibold"></span>
            </div>

            <div class="h-3 rounded-full bg-slate-700 overflow-hidden">
              <div id="qualityBar" class="h-full rounded-full transition-all duration-200"></div>
            </div>

            <div class="text-slate-300 text-base">
              <span class="text-slate-400">Fair range:</span>
              <span id="range"></span>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div id="peakCard" class="mini-card">
              <div class="text-sm text-slate-400">Session peak</div>
              <div id="peakOut" class="mt-2 text-2xl font-bold"></div>
            </div>

            <div class="mini-card">
              <div class="text-sm text-slate-400">Model size</div>
              <div id="parlayOut" class="mt-2 text-2xl font-bold"></div>
            </div>
          </div>

          <div id="liveSessionCard" class="mini-card hidden-soft space-y-2">
            <div class="text-sm text-slate-400">Session tracker</div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <div class="text-xs text-slate-400">Current</div>
                <div id="sessionCurrent" class="mt-1 text-xl font-bold"></div>
              </div>
              <div>
                <div class="text-xs text-slate-400">Trend</div>
                <div id="sessionTrend" class="mt-1 text-xl font-bold"></div>
              </div>
              <div>
                <div class="text-xs text-slate-400">Best seen</div>
                <div id="sessionBest" class="mt-1 text-xl font-bold"></div>
              </div>
              <div>
                <div class="text-xs text-slate-400">Worst seen</div>
                <div id="sessionWorst" class="mt-1 text-xl font-bold"></div>
              </div>
            </div>
            <div id="sessionVsBest" class="text-slate-300 text-sm"></div>
          </div>

          <div id="notLiveNextCard" class="mini-card hidden-soft space-y-2">
            <div id="next" class="text-2xl font-bold text-sky-300 leading-tight"></div>
            <div id="nextSub" class="text-slate-300 text-base"></div>
            <div id="assumptionNote" class="text-slate-400 text-sm"></div>
          </div>
        </div>
      </div>

      <div
        id="emptyState"
        class="rounded-2xl bg-slate-900/40 border border-white/10 px-4 py-4 text-sm text-slate-400"
      >
        Enter your bet details to estimate the current value of the ticket.
      </div>
    </div>
  </div>
  <script>
  const state = {
    mode: 'live',
    input: 'odds',
    legs: [],
    peakValue: 0,
    lastCalcKey: '',
    detailsOpen: false,
    sessionTracker: {
      calcKey: '',
      current: null,
      best: null,
      worst: null,
      last: null,
      trend: '—'
    }
  };

  const $ = (id) => document.getElementById(id);

  function money(n) {
    return `$${Number(n || 0).toFixed(2)}`;
  }

  function pct(n) {
    return `${(Number(n || 0) * 100).toFixed(1)}%`;
  }

  function clamp(n, min, max) {
    return Math.min(Math.max(n, min), max);
  }

  function sanitizeOdds(v) {
    if (!v) return '';
    v = String(v).trim().replace(/\s+/g, '').replace(/[^0-9+-]/g, '');
    if (v.length > 1) v = v[0] + v.slice(1).replace(/[+-]/g, '');
    if (/^\d+$/.test(v)) v = '+' + v;
    return v;
  }

  function parseOdds(v) {
    if (!v) return null;
    const cleaned = sanitizeOdds(v);
    if (!/^[+-]?\d+$/.test(cleaned)) return null;
    const n = Number(cleaned);
    return Number.isFinite(n) && n !== 0 ? n : null;
  }

  function oddsToProb(o) {
    return o > 0 ? 100 / (o + 100) : Math.abs(o) / (Math.abs(o) + 100);
  }

  function inferLegCount(stake, payout) {
    if (!stake || !payout || payout <= stake) return 1;
    const multiple = payout / stake;
    if (multiple >= 20) return 4;
    if (multiple >= 8) return 3;
    if (multiple >= 3) return 2;
    return 1;
  }

  function discount(prob, legs) {
    if (legs >= 4) return 0.47;
    if (legs === 3) return 0.52;
    if (legs === 2) return 0.66;

    if (prob > 0.80) return 0.90;
    if (prob > 0.60) return 0.82;
    if (prob > 0.30) return 0.72;
    if (prob > 0.10) return 0.62;
    return 0.54;
  }

  function nextLegMultiplier(prob) {
    if (prob < 0.03) return 2.2;
    if (prob < 0.08) return 1.9;
    if (prob < 0.18) return 1.65;
    if (prob < 0.35) return 1.45;
    return 1.22;
  }

  function getBaseCalcKey() {
    return JSON.stringify({
      mode: state.mode,
      input: state.input,
      stake: $('stake').value,
      payout: $('payout').value,
      odds: $('odds').value,
      prob: $('prob').value,
      legs: state.legs
    });
  }

  function qualityLabel(ratio) {
    if (ratio >= 1.05) return { label: 'Strong', color: 'text-emerald-300', bar: 'bg-emerald-500' };
    if (ratio >= 0.90) return { label: 'Fair', color: 'text-lime-300', bar: 'bg-lime-500' };
    if (ratio >= 0.75) return { label: 'Slightly discounted', color: 'text-yellow-300', bar: 'bg-yellow-500' };
    if (ratio >= 0.60) return { label: 'Discounted', color: 'text-amber-300', bar: 'bg-amber-500' };
    return { label: 'Poor', color: 'text-rose-300', bar: 'bg-rose-500' };
  }

  function getProbability() {
    if (state.mode === 'live') {
      if (state.input === 'odds') {
        const o = parseOdds($('odds').value);
        if (!o) return { probability: null };
        return { probability: oddsToProb(o) };
      }

      const p = parseFloat($('prob').value);
      if (!Number.isFinite(p) || p <= 0 || p > 100) return { probability: null };
      return { probability: p / 100 };
    }

    if (!state.legs.length) return { probability: null };

    let usedNeutralFallback = false;

    const probability = state.legs.reduce((acc, leg) => {
      if (leg && Number.isFinite(leg.currentOdds)) {
        return acc * oddsToProb(leg.currentOdds);
      }

      if (leg && Number.isFinite(leg.originalOdds)) {
        return acc * oddsToProb(leg.originalOdds);
      }

      usedNeutralFallback = true;
      return acc * 0.5;
    }, 1);

    return {
      probability,
      usedNeutralFallback
    };
  }

  function getNextLegValue({ payout, adjusted, inferredLegs, prob, usedNeutralFallback }) {
    if (inferredLegs <= 1) {
      return {
        nextValue: payout,
        nextGain: payout - adjusted,
        nextLabel: 'Final leg hits',
        note: usedNeutralFallback ? 'Uses neutral estimate for any future leg with unknown odds.' : ''
      };
    }

    const boostedProb = clamp(prob * nextLegMultiplier(prob), 0, 0.98);
    const nextRemainingLegs = Math.max(inferredLegs - 1, 1);
    const nextAdjusted = payout * boostedProb * discount(boostedProb, nextRemainingLegs);

    return {
      nextValue: nextAdjusted,
      nextGain: nextAdjusted - adjusted,
      nextLabel: 'Next leg hits',
      note: usedNeutralFallback ? 'Includes neutral 50% estimate for unstarted leg.' : ''
    };
  }

  function resetSessionTracker(baseCalcKey) {
    state.sessionTracker = {
      calcKey: baseCalcKey,
      current: null,
      best: null,
      worst: null,
      last: null,
      trend: '—'
    };
  }

  function updateSessionTracker(baseCalcKey, cash) {
    if (state.sessionTracker.calcKey !== baseCalcKey) {
      resetSessionTracker(baseCalcKey);
    }

    if (!Number.isFinite(cash) || cash <= 0) {
      return;
    }

    const tracker = state.sessionTracker;

    tracker.current = cash;

    if (tracker.best === null || cash > tracker.best) {
      tracker.best = cash;
    }

    if (tracker.worst === null || cash < tracker.worst) {
      tracker.worst = cash;
    }

    if (tracker.last === null) {
      tracker.trend = 'Flat';
    } else if (cash > tracker.last) {
      tracker.trend = 'Rising';
    } else if (cash < tracker.last) {
      tracker.trend = 'Falling';
    } else {
      tracker.trend = 'Flat';
    }

    tracker.last = cash;
  }
    function updateModeButtons() {
    $('liveBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-xl ${state.mode === 'live' ? 'active-blue' : 'bg-slate-700'}`;
    $('notLiveBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-xl ${state.mode === 'notLive' ? 'active-blue' : 'bg-slate-700'}`;

    $('oddsBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-xl ${state.input === 'odds' ? 'active-green' : 'bg-slate-700'}`;
    $('probBtn').className = `toggle-btn h-14 rounded-2xl font-semibold text-xl ${state.input === 'prob' ? 'active-green' : 'bg-slate-700'}`;

    $('liveWrap').classList.toggle('hidden-soft', state.mode !== 'live');
    $('legsWrap').classList.toggle('hidden-soft', state.mode !== 'notLive');

    $('odds').classList.toggle('hidden-soft', state.input !== 'odds');
    $('prob').classList.toggle('hidden-soft', state.input !== 'prob');
  }

  function updateDetailsPanel() {
    $('detailsPanel').classList.toggle('hidden-soft', !state.detailsOpen);
    $('detailsToggle').setAttribute('aria-expanded', String(state.detailsOpen));
    $('detailsChevron').textContent = state.detailsOpen ? 'Hide' : 'Show';
  }

  function renderLegs() {
    const wrap = $('legs');
    wrap.innerHTML = '';

    state.legs.forEach((leg, i) => {
      const row = document.createElement('div');
      row.className = 'flex gap-2';

      const input = document.createElement('input');
      input.className = 'input-base flex-1';
      input.style.height = '54px';
      input.inputMode = 'text';
      input.placeholder = 'Odds (-110)';
      input.value = Number.isFinite(leg.currentOdds)
        ? (leg.currentOdds > 0 ? `+${leg.currentOdds}` : `${leg.currentOdds}`)
        : (Number.isFinite(leg.originalOdds) ? (leg.originalOdds > 0 ? `+${leg.originalOdds}` : `${leg.originalOdds}`) : '');

      input.oninput = (e) => {
        e.target.value = sanitizeOdds(e.target.value);
        const parsed = parseOdds(e.target.value);

        if (parsed !== null) {
          state.legs[i].currentOdds = parsed;
          if (!Number.isFinite(state.legs[i].originalOdds)) {
            state.legs[i].originalOdds = parsed;
          }
        } else {
          state.legs[i].currentOdds = null;
        }

        calc();
      };

      const del = document.createElement('button');
      del.className = 'w-14 rounded-2xl bg-slate-700 text-xl';
      del.textContent = '×';
      del.setAttribute('aria-label', 'Remove leg');
      del.onclick = () => {
        state.legs.splice(i, 1);
        renderLegs();
        calc();
      };

      row.appendChild(input);
      row.appendChild(del);
      wrap.appendChild(row);
    });
  }

  function hideResults(message) {
    $('result').classList.add('hidden-soft');
    $('emptyState').classList.remove('hidden-soft');
    $('emptyState').textContent = message;
  }

  function showResults() {
    $('result').classList.remove('hidden-soft');
    $('emptyState').classList.add('hidden-soft');
  }

  function calc() {
    const stake = parseFloat($('stake').value);
    const payout = parseFloat($('payout').value);
    const cash = parseFloat($('cash').value);

    if (!Number.isFinite(stake) || !Number.isFinite(payout) || payout <= stake) {
      hideResults('Enter a valid stake and payout. Payout must be greater than stake.');
      return;
    }

    const probabilityData = getProbability();
    const prob = probabilityData.probability;
    const usedNeutralFallback = !!probabilityData.usedNeutralFallback;

    if (prob === null || prob <= 0 || prob > 1) {
      hideResults(state.mode === 'live'
        ? 'Enter valid live odds or win %.'
        : 'Add at least one remaining leg.');
      return;
    }

    const inferredLegs = state.mode === 'live'
      ? inferLegCount(stake, payout)
      : state.legs.length;

    const rawEV = prob * payout;
    const adjusted = rawEV * discount(prob, inferredLegs);
    const low = adjusted * 0.92;
    const high = adjusted * 1.08;
    const baseCalcKey = getBaseCalcKey();

    if (baseCalcKey !== state.lastCalcKey) {
      state.peakValue = adjusted;
      state.lastCalcKey = baseCalcKey;
    } else {
      state.peakValue = Math.max(state.peakValue || 0, adjusted);
    }

    updateSessionTracker(baseCalcKey, cash);
    showResults();

    $('main').textContent = `Estimated ≈ ${money(adjusted)}`;

    let gradeText = 'Add cashout offer to compare';
    let gradeClass = 'text-slate-200';
    let differenceText = '';
    let ratioText = 'No offer entered';
    let qualityBarWidth = 0;
    let qualityBarClass = 'bg-slate-600';

    const summaryLine = `Win ${pct(prob)} • ${state.mode === 'live' ? `~${inferredLegs} legs` : `${inferredLegs} remaining`}`;

    if (Number.isFinite(cash) && cash > 0) {
      const ratio = cash / adjusted;
      const quality = qualityLabel(ratio);
      const diff = cash - adjusted;

      gradeText = `${quality.label} → ${money(cash)}`;
      gradeClass = quality.color;
      ratioText = `${(ratio * 100).toFixed(0)}% of est. value`;
      qualityBarWidth = Math.min(ratio * 100, 100);
      qualityBarClass = quality.bar;

      if (diff >= 0) {
        differenceText = `Offer is ~${money(Math.abs(diff))} above estimated value.`;
      } else {
        differenceText = `Giving up ~${money(Math.abs(diff))} vs estimated value.`;
      }
    } else {
      differenceText = 'Enter the live cashout offer to compare value.';
    }

    $('grade').className = `text-2xl font-bold ${gradeClass}`;
    $('grade').textContent = gradeText;
    $('difference').textContent = differenceText;
    $('summaryLine').textContent = summaryLine;

    $('ratioText').textContent = ratioText;
    $('qualityBar').className = `h-full rounded-full transition-all duration-200 ${qualityBarClass}`;
    $('qualityBar').style.width = `${qualityBarWidth}%`;
    $('range').textContent = `${money(low)} – ${money(high)}`;

    $('parlayOut').textContent = state.mode === 'live'
      ? `~${inferredLegs} legs`
      : `${inferredLegs} remaining`;

    $('peakOut').textContent = money(state.peakValue);
    if (Math.abs(state.peakValue - adjusted) < 0.01) {
      $('peakCard').classList.add('hidden-soft');
    } else {
      $('peakCard').classList.remove('hidden-soft');
    }

    if (state.mode === 'live') {
      $('liveSessionCard').classList.remove('hidden-soft');
      $('notLiveNextCard').classList.add('hidden-soft');

      const tracker = state.sessionTracker;
      $('sessionCurrent').textContent = tracker.current !== null ? money(tracker.current) : '—';
      $('sessionBest').textContent = tracker.best !== null ? money(tracker.best) : '—';
      $('sessionWorst').textContent = tracker.worst !== null ? money(tracker.worst) : '—';
      $('sessionTrend').textContent = tracker.trend || '—';

      if (tracker.current !== null && tracker.best !== null) {
        const vsBest = tracker.current - tracker.best;
        if (vsBest === 0) {
          $('sessionVsBest').textContent = 'Current offer matches the best seen this session.';
        } else {
          $('sessionVsBest').textContent = `Current vs best: ${vsBest > 0 ? '+' : ''}${money(vsBest)}`;
        }
      } else {
        $('sessionVsBest').textContent = 'Enter cashout offers over time to track the session.';
      }
    } else {
      $('liveSessionCard').classList.add('hidden-soft');
      $('notLiveNextCard').classList.remove('hidden-soft');

      const nextData = getNextLegValue({
        payout,
        adjusted,
        inferredLegs,
        prob,
        usedNeutralFallback
      });

      $('next').textContent = `${nextData.nextLabel} → ~${money(nextData.nextValue)}`;
      $('nextSub').textContent = `${nextData.nextGain >= 0 ? '+' : ''}${money(nextData.nextGain)} from current estimate`;
      $('assumptionNote').textContent = nextData.note || '';
    }
  }

  document.querySelectorAll('input').forEach((input) => {
    input.addEventListener('input', calc);
  });

  $('odds').addEventListener('input', (e) => {
    e.target.value = sanitizeOdds(e.target.value);
  });

  $('liveBtn').onclick = () => {
    state.mode = 'live';
    updateModeButtons();
    calc();
    $('odds').focus();
  };

  $('notLiveBtn').onclick = () => {
    state.mode = 'notLive';
    updateModeButtons();
    calc();
  };

  $('oddsBtn').onclick = () => {
    state.input = 'odds';
    updateModeButtons();
    calc();
    $('odds').focus();
  };

  $('probBtn').onclick = () => {
    state.input = 'prob';
    updateModeButtons();
    calc();
    $('prob').focus();
  };

  $('addLeg').onclick = () => {
    state.legs.push({
      currentOdds: -110,
      originalOdds: -110
    });
    renderLegs();
    calc();
  };

  $('detailsToggle').onclick = () => {
    state.detailsOpen = !state.detailsOpen;
    updateDetailsPanel();
  };

  $('detailsToggle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      state.detailsOpen = !state.detailsOpen;
      updateDetailsPanel();
    }
  });

  updateModeButtons();
  updateDetailsPanel();
  renderLegs();
  calc();
</script>
</body>
</html>
