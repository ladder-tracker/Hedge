<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Should I Cash Out?</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen p-4">
  <div class="max-w-xl mx-auto space-y-4">

    <h1 class="text-2xl font-bold">Should I Cash Out?</h1>

    <!-- Bet Info -->
    <div class="space-y-3">
      <input id="stakeInput" placeholder="Stake ($25)" class="w-full p-3 rounded bg-slate-800"/>
      <input id="payoutInput" placeholder="Payout ($1500)" class="w-full p-3 rounded bg-slate-800"/>
      <input id="cashoutInput" placeholder="Cashout (optional)" class="w-full p-3 rounded bg-slate-800"/>
    </div>

    <!-- Mode -->
    <div class="flex gap-2">
      <button id="liveModeBtn" class="flex-1 p-3 bg-blue-600 rounded">Live</button>
      <button id="notLiveModeBtn" class="flex-1 p-3 bg-slate-700 rounded">Not Live</button>
    </div>

    <!-- Live Inputs -->
    <div id="liveWrap" class="space-y-3">
      <div class="flex gap-2">
        <button id="oddsModeBtn" class="flex-1 p-2 bg-green-600 rounded">Odds</button>
        <button id="probModeBtn" class="flex-1 p-2 bg-slate-700 rounded">%</button>
      </div>

      <input id="oddsInput" placeholder="Live odds (-150)" class="w-full p-3 rounded bg-slate-800"/>
      <input id="probInput" placeholder="Win % (65)" class="w-full p-3 rounded bg-slate-800 hidden"/>
    </div>

    <!-- Not Live -->
    <div id="legsWrap" class="hidden space-y-2">
      <button id="addLegBtn" class="w-full p-2 bg-blue-500 rounded">+ Add Leg</button>
      <div id="legsList" class="space-y-2"></div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden p-4 bg-slate-800 rounded space-y-2">
      <div id="main" class="text-xl font-bold"></div>
      <div id="range" class="text-sm text-slate-300"></div>
      <div id="prob" class="text-sm text-slate-300"></div>
      <div id="grade" class="text-sm font-semibold"></div>
    </div>

  </div>
  
  <script>
const state = {
  mode: 'live',
  inputMode: 'odds',
  legs: []
};

const $ = id => document.getElementById(id);

function oddsToProb(o){
  return o>0 ? 100/(o+100) : Math.abs(o)/(Math.abs(o)+100);
}

function parseOdds(v){
  if(!v) return null;
  v = v.replace(/[^\d+-]/g,'');
  if(/^\d+$/.test(v)) v = '+'+v;
  const n = Number(v);
  return isNaN(n)||n===0?null:n;
}

function discount(prob, legs){
  if(legs>=3) return 0.45;
  if(legs===2) return 0.6;

  if(prob>0.8) return 0.9;
  if(prob>0.6) return 0.8;
  if(prob>0.3) return 0.7;
  if(prob>0.1) return 0.6;

  return 0.5;
}

function calc(){
  const stake = +$('stakeInput').value;
  const payout = +$('payoutInput').value;
  const cash = +$('cashoutInput').value;

  if(!stake || !payout || payout<=stake){
    $('result').classList.add('hidden');
    return;
  }

  let prob;

  if(state.mode==='live'){
    if(state.inputMode==='odds'){
      const o = parseOdds($('oddsInput').value);
      if(!o) return;
      prob = oddsToProb(o);
    } else {
      prob = +$('probInput').value/100;
    }
  } else {
    if(state.legs.length===0) return;
    prob = state.legs.reduce((a,o)=>a*oddsToProb(o),1);
  }

  const raw = prob * payout;
  const adj = raw * discount(prob, state.legs.length);

  $('result').classList.remove('hidden');
  $('main').innerText = `Estimated ≈ $${adj.toFixed(2)}`;
  $('range').innerText = `Range $${(adj*0.92).toFixed(2)} – $${(adj*1.08).toFixed(2)}`;
  $('prob').innerText = `Win ${ (prob*100).toFixed(1) }%`;

  if(cash){
    const r = cash/adj;
    let label = 'Poor';
    if(r>=0.9) label='Fair';
    else if(r>=0.75) label='Slightly discounted';
    else if(r>=0.6) label='Discounted';

    $('grade').innerText = `${label} → $${cash}`;
  } else {
    $('grade').innerText = '';
  }
}

/* UI EVENTS */

document.querySelectorAll('input').forEach(i=>i.oninput=calc);

$('liveModeBtn').onclick=()=>{
  state.mode='live';
  $('liveWrap').classList.remove('hidden');
  $('legsWrap').classList.add('hidden');
};

$('notLiveModeBtn').onclick=()=>{
  state.mode='notLive';
  $('liveWrap').classList.add('hidden');
  $('legsWrap').classList.remove('hidden');
};

$('oddsModeBtn').onclick=()=>{
  state.inputMode='odds';
  $('oddsInput').classList.remove('hidden');
  $('probInput').classList.add('hidden');
};

$('probModeBtn').onclick=()=>{
  state.inputMode='prob';
  $('oddsInput').classList.add('hidden');
  $('probInput').classList.remove('hidden');
};

$('addLegBtn').onclick=()=>{
  state.legs.push(-110);
  renderLegs();
};

function renderLegs(){
  const wrap = $('legsList');
  wrap.innerHTML='';

  state.legs.forEach((o,i)=>{
    const input = document.createElement('input');
    input.value = o;
    input.className = "w-full p-2 bg-slate-800 rounded";
    input.oninput=(e)=>{
      const parsed = parseOdds(e.target.value);
      if(parsed) state.legs[i]=parsed;
      calc();
    };
    wrap.appendChild(input);
  });
}

calc();
</script>

</body>
</html>
