<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>One Leg Left</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: dark;
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at top right, rgba(168,85,247,0.14), transparent 30%),
        linear-gradient(180deg, #08111f 0%, #0b1324 45%, #0f172a 100%);
      color: #fff;
    }

    .glass {
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.14);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
    }

    .glass-soft {
      background: rgba(15, 23, 42, 0.56);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.10);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .input-base {
      width: 100%;
      height: 58px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(30, 41, 59, 0.92);
      color: white;
      padding: 0 18px;
      font-size: 17px;
      outline: none;
    }

    .input-base::placeholder {
      color: rgb(148 163 184);
    }

    .input-base:focus {
      border-color: rgba(96, 165, 250, 0.45);
      box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.25) inset;
    }

    .hidden-soft {
      display: none !important;
    }

    .mini-card {
      border-radius: 22px;
      background: rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
    }

    .details-toggle {
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="max-w-xl mx-auto p-4 pb-10 space-y-4">
    <div class="pt-2">
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">One Leg Left</h1>
      <p class="text-slate-300 mt-2 text-sm sm:text-base">
        Compare ride, cashout, and hedge using the remaining leg odds.
      </p>
    </div>

    <div class="glass rounded-[28px] p-4 sm:p-5 space-y-4">
      <div class="space-y-3">
        <input
          id="stake"
          class="input-base"
          inputmode="decimal"
          placeholder="Stake"
          aria-label="Stake"
        />
        <input
          id="payout"
          class="input-base"
          inputmode="decimal"
          placeholder="Total payout"
          aria-label="Total payout"
        />
        <input
          id="cash"
          class="input-base"
          inputmode="decimal"
          placeholder="Cashout offer"
          aria-label="Cashout offer"
        />
        <input
          id="remainingOdds"
          class="input-base"
          inputmode="text"
          placeholder="Remaining leg odds"
          aria-label="Remaining leg odds"
        />
        <input
          id="actualHedgeOdds"
          class="input-base"
          inputmode="text"
          placeholder="Actual hedge line available (optional)"
          aria-label="Actual hedge line available"
        />
      </div>
            <div id="result" class="hidden-soft glass-soft rounded-[28px] p-5 space-y-4">
        <div class="space-y-2">
          <div id="main" class="text-3xl sm:text-4xl font-bold leading-tight"></div>
          <div id="grade" class="text-2xl font-bold"></div>
          <div id="difference" class="text-slate-300 text-lg"></div>
          <div id="summaryLine" class="text-slate-300 text-base"></div>
        </div>

        <div
          id="detailsToggle"
          class="details-toggle flex items-center justify-between rounded-2xl bg-slate-900/50 border border-white/10 px-4 py-3 cursor-pointer"
          role="button"
          tabindex="0"
          aria-expanded="false"
        >
          <span class="text-sm text-slate-200 font-medium">Details</span>
          <span id="detailsChevron" class="text-slate-400 text-sm">Show</span>
        </div>

        <div id="detailsPanel" class="hidden-soft space-y-4">
          <div class="space-y-3">
            <div class="flex items-center justify-between text-sm gap-3">
              <span class="text-slate-300">Cashout value</span>
              <span id="ratioText" class="text-slate-100 font-semibold"></span>
            </div>

            <div class="h-3 rounded-full bg-slate-700 overflow-hidden">
              <div id="qualityBar" class="h-full rounded-full transition-all duration-200"></div>
            </div>

            <div class="text-slate-300 text-base">
              <span class="text-slate-400">Fair range:</span>
              <span id="range"></span>
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div class="mini-card">
              <div class="text-sm text-slate-400">Estimated hedge line</div>
              <div id="estimatedLineOut" class="mt-2 text-2xl font-bold"></div>
            </div>

            <div class="mini-card">
              <div class="text-sm text-slate-400">Line used</div>
              <div id="lineUsedOut" class="mt-2 text-2xl font-bold"></div>
            </div>
          </div>

          <div class="mini-card">
            <div class="text-sm text-slate-400">Hedge plan</div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
              <div>
                <div class="text-xs text-slate-400">Suggested hedge</div>
                <div id="hedgeStakeOut" class="mt-1 text-xl font-bold"></div>
              </div>
              <div>
                <div class="text-xs text-slate-400">Ride fair profit</div>
                <div id="rideFairProfitOut" class="mt-1 text-xl font-bold"></div>
              </div>
              <div>
                <div class="text-xs text-slate-400">If original wins</div>
                <div id="origWinsOut" class="mt-1 text-xl font-bold"></div>
              </div>
              <div>
                <div class="text-xs text-slate-400">If hedge wins</div>
                <div id="hedgeWinsOut" class="mt-1 text-xl font-bold"></div>
              </div>
            </div>
          </div>

          <div class="mini-card">
            <div class="text-sm text-slate-400">Decision guide</div>
            <div id="bestOptionOut" class="mt-2 text-xl font-bold"></div>
            <div id="bestOptionSub" class="mt-2 text-slate-300 text-sm"></div>
          </div>
        </div>
      </div>

      <div
        id="emptyState"
        class="rounded-2xl bg-slate-900/40 border border-white/10 px-4 py-4 text-sm text-slate-400"
      >
        Enter your bet details to get started.
      </div>
    </div>
  </div>
  <script>
  const state = {
    detailsOpen: false
  };

  const $ = (id) => document.getElementById(id);

  function money(n) {
    return `$${Number(n || 0).toFixed(2)}`;
  }

  function pct(n) {
    return `${(Number(n || 0) * 100).toFixed(1)}%`;
  }

  function clamp(n, min, max) {
    return Math.min(Math.max(n, min), max);
  }

  function sanitizeOdds(v) {
    if (!v) return '';
    v = String(v).trim().replace(/\s+/g, '').replace(/[^0-9+-]/g, '');
    if (v.length > 1) v = v[0] + v.slice(1).replace(/[+-]/g, '');
    if (/^\d+$/.test(v)) v = '+' + v;
    return v;
  }

  function parseOdds(v) {
    if (!v) return null;
    const cleaned = sanitizeOdds(v);
    if (!/^[+-]?\d+$/.test(cleaned)) return null;
    const n = Number(cleaned);
    return Number.isFinite(n) && n !== 0 ? n : null;
  }

  function oddsToProb(o) {
    return o > 0 ? 100 / (o + 100) : Math.abs(o) / (Math.abs(o) + 100);
  }

  function probToAmerican(prob) {
    if (!Number.isFinite(prob) || prob <= 0 || prob >= 1) return null;
    if (prob >= 0.5) return -Math.round((prob / (1 - prob)) * 100);
    return Math.round(((1 - prob) / prob) * 100);
  }

  function americanToDecimal(o) {
    return o > 0 ? 1 + (o / 100) : 1 + (100 / Math.abs(o));
  }

  function qualityLabel(ratio) {
    if (ratio >= 1.05) return { label: 'Strong', color: 'text-emerald-300', bar: 'bg-emerald-500' };
    if (ratio >= 0.90) return { label: 'Fair', color: 'text-lime-300', bar: 'bg-lime-500' };
    if (ratio >= 0.75) return { label: 'Slightly discounted', color: 'text-yellow-300', bar: 'bg-yellow-500' };
    if (ratio >= 0.60) return { label: 'Discounted', color: 'text-amber-300', bar: 'bg-amber-500' };
    return { label: 'Poor', color: 'text-rose-300', bar: 'bg-rose-500' };
  }

  function getOriginalCombinedOdds(stake, payout) {
    if (!Number.isFinite(stake) || !Number.isFinite(payout) || stake <= 0 || payout <= stake) return null;
    const decimal = payout / stake;
    return Math.round((decimal - 1) * 100);
  }

  function estimateOppositeLineWithVig(remainingOdds, hold = 0.04) {
    const remainingProb = oddsToProb(remainingOdds);
    const oppositeFairProb = 1 - remainingProb;
    const viggedOppositeProb = clamp(oppositeFairProb * (1 + hold), 0.0001, 0.9999);
    const estimatedOppositeLine = probToAmerican(viggedOppositeProb);

    return {
      remainingProb,
      oppositeFairProb,
      estimatedOppositeLine
    };
  }

  function hideResults(message) {
    $('result').classList.add('hidden-soft');
    $('emptyState').classList.remove('hidden-soft');
    $('emptyState').textContent = message;
  }

  function showResults() {
    $('result').classList.remove('hidden-soft');
    $('emptyState').classList.add('hidden-soft');
  }

  function updateDetailsPanel() {
    $('detailsPanel').classList.toggle('hidden-soft', !state.detailsOpen);
    $('detailsToggle').setAttribute('aria-expanded', String(state.detailsOpen));
    $('detailsChevron').textContent = state.detailsOpen ? 'Hide' : 'Show';
  }
    function calc() {
    const stake = parseFloat($('stake').value);
    const payout = parseFloat($('payout').value);
    const cash = parseFloat($('cash').value);
    const remainingOdds = parseOdds($('remainingOdds').value);
    const actualHedgeOdds = parseOdds($('actualHedgeOdds').value);

    if (!Number.isFinite(stake) || !Number.isFinite(payout) || payout <= stake) {
      hideResults('Enter a valid stake and payout. Payout must be greater than stake.');
      return;
    }

    if (remainingOdds === null) {
      hideResults('Enter the remaining leg odds.');
      return;
    }

    const { remainingProb, estimatedOppositeLine } = estimateOppositeLineWithVig(remainingOdds, 0.04);

    if (estimatedOppositeLine === null) {
      hideResults('Could not estimate the hedge line from the remaining leg odds.');
      return;
    }

    const lineUsed = actualHedgeOdds !== null ? actualHedgeOdds : estimatedOppositeLine;
    const lineUsedLabel = actualHedgeOdds !== null ? 'Actual' : 'Estimated';

    const fairValue = payout * remainingProb;
    const fairProfit = fairValue - stake;
    const low = fairValue * 0.92;
    const high = fairValue * 1.08;

    const hedgeDecimal = americanToDecimal(lineUsed);
    const hedgeStake = payout / hedgeDecimal;

    const ifOriginalWins = payout - stake - hedgeStake;
    const ifHedgeWins = (hedgeStake * (hedgeDecimal - 1)) - stake;
    const hedgeFloor = Math.min(ifOriginalWins, ifHedgeWins);

    showResults();

    $('main').textContent = `Fair value ≈ ${money(fairValue)}`;

    let gradeText = 'Add cashout offer';
    let gradeClass = 'text-slate-200';
    let differenceText = '';
    let ratioText = 'No offer entered';
    let qualityBarWidth = 0;
    let qualityBarClass = 'bg-slate-600';

    const originalCombined = getOriginalCombinedOdds(stake, payout);
    $('summaryLine').textContent = `Win ${pct(remainingProb)} • 1 leg left • Original: ${originalCombined ? `+${originalCombined}` : '—'}`;

    let cashProfit = null;

    if (Number.isFinite(cash) && cash > 0) {
      cashProfit = cash - stake;
      const ratio = cash / fairValue;
      const quality = qualityLabel(ratio);
      const diff = cash - fairValue;

      gradeText = `${quality.label} → ${money(cash)}`;
      gradeClass = quality.color;
      ratioText = `${(ratio * 100).toFixed(0)}% of fair value`;
      qualityBarWidth = Math.min(ratio * 100, 100);
      qualityBarClass = quality.bar;

      if (diff >= 0) {
        differenceText = `Offer is about ${money(Math.abs(diff))} above fair value.`;
      } else {
        differenceText = `Giving up about ${money(Math.abs(diff))} vs fair value.`;
      }
    } else {
      differenceText = 'Add the cashout offer to compare it to fair value.';
    }

    $('grade').className = `text-2xl font-bold ${gradeClass}`;
    $('grade').textContent = gradeText;
    $('difference').textContent = differenceText;

    $('ratioText').textContent = ratioText;
    $('qualityBar').className = `h-full rounded-full transition-all duration-200 ${qualityBarClass}`;
    $('qualityBar').style.width = `${qualityBarWidth}%`;
    $('range').textContent = `${money(low)} – ${money(high)}`;

    $('estimatedLineOut').textContent = estimatedOppositeLine > 0 ? `+${estimatedOppositeLine}` : `${estimatedOppositeLine}`;
    $('lineUsedOut').textContent = `${lineUsedLabel}: ${lineUsed > 0 ? `+${lineUsed}` : `${lineUsed}`}`;
    $('hedgeStakeOut').textContent = money(hedgeStake);
    $('rideFairProfitOut').textContent = money(fairProfit);
    $('origWinsOut').textContent = money(ifOriginalWins);
    $('hedgeWinsOut').textContent = money(ifHedgeWins);

    let expectedValueLeader = 'Ride';
    if (cashProfit !== null && cashProfit > fairProfit) {
      expectedValueLeader = 'Cashout';
    }

    let guaranteedLeader = 'Hedge';
    if (cashProfit !== null && cashProfit > hedgeFloor) {
      guaranteedLeader = 'Cashout';
    }

    if (cashProfit !== null) {
      $('bestOptionOut').textContent = `Best EV: ${expectedValueLeader} • Best guaranteed: ${guaranteedLeader}`;
      $('bestOptionSub').textContent =
        `Ride EV: ${money(fairProfit)} • Cashout profit: ${money(cashProfit)} • Hedge floor: ${money(hedgeFloor)}`;
    } else {
      $('bestOptionOut').textContent = 'Ride vs hedge';
      $('bestOptionSub').textContent =
        `Ride EV: ${money(fairProfit)} • Hedge floor: ${money(hedgeFloor)}`;
    }
  }

  document.querySelectorAll('input').forEach((input) => {
    input.addEventListener('input', calc);
  });

  $('remainingOdds').addEventListener('input', (e) => {
    e.target.value = sanitizeOdds(e.target.value);
  });

  $('actualHedgeOdds').addEventListener('input', (e) => {
    e.target.value = sanitizeOdds(e.target.value);
  });

  $('detailsToggle').onclick = () => {
    state.detailsOpen = !state.detailsOpen;
    updateDetailsPanel();
  };

  $('detailsToggle').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      state.detailsOpen = !state.detailsOpen;
      updateDetailsPanel();
    }
  });

  updateDetailsPanel();
  calc();
</script>
</body>
</html>
